<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta http-equiv="X-UA-Compatible" content="ie=edge">
 <title>Qr Code</title>
 <link rel="icon" href="./images/favicon-32x32.png" type="image/x-icon">
 <style>
  @font-face{
   font-family: Outfit;
   src: url("./font/Outfit-VariableFont_wght.ttf");
  }
  :root{
   font-size: 15px;
  }
  *{
   margin: 0;
   padding: 0;
   font-family: Outfit;
   text-align: center;
  }
  body{
   background-color: rgb(214,226,240);
  }
  .card {
   background-color: #fff;
   width: min(380px, 85%);
   position: absolute;
   left: 50%;
   top: 50%;
   transform: translate(-50%, -50%);
   box-sizing: border-box;
   padding: 17px 16px;
   border-radius: 20px;
   margin: 15px 0;
  }
  img{
   width: 100%;
   border-radius: 20px;
  }
  h1{
   margin: 16px auto;
   width: 90%;
   color: rgb(31,50,81);
   font-size: 1.6em;
  }
  p{
   width: 85%;
   margin: auto;
   color: rgb(104,119,141);
   font-size: 0.88em;
  }
 </style>
</head>
<body>
 <div class="card">
  
  <img src="./images/image-qr-code.png" alt="qr code"/>
  <h1>Improve your front-end skills by building projects</h1>
  <p>Scan the GR code to visit Frontend Mentor and take your coding skills to the next level</p>
 </div>
 <script>
  let cardH = getComputedStyle(document.querySelectorAll(".card")[0]).height
  document.body.style.height = Number(cardH.replace("px", "")) + 60 + "px"
  
 </script>
</body>
</html>
