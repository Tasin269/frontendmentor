<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Blog Preview Card</title>
  <link rel="icon" href="./assets/images/favicon-32x32.png" />
  <style>
   @font-face {
    font-family: Figtree;
    src: url("./assets/fonts/Figtree-VariableFont_wght.ttf");
   }
   * {
    margin: 0;
    padding: 0;
    font-family: Figtree;
   }
   body {
    background-color: hsl(47, 88%, 63%);
   }
   .container{
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 40px 0;
   }
   #card {
    background-color: #fff;
    width: min(75%, 330px);
    padding: 20px;
    border-radius: 15px;
    animation: loading 0.3s 1;
    box-shadow: 9px 9px #000;
   }
   #card > img{
    display: block;
    margin: auto;
    width: 100%;
    border-radius: 6px;
    margin-bottom: 20px;
   }
   h6{
    background-color: hsl(47, 88%, 63%);
    font-size: 0.8em;
    display: inline-block;
    padding: 3px 5px;
    border-radius: 2px;
    margin-bottom: 12px;
    font-weight: 800;
   }
   h6:hover{
    color: hsl(47, 88%, 63%);
    background-color: #000;
   }
   h5{
    margin-bottom: 15px;
   }
   h5:hover{
    color: hsl(47, 88%, 63%);
   }
   h2{
    margin-bottom: 18px;
    font-weight: 800;
   }
   h2:hover{
    color: hsl(47, 88%, 63%);
   }
   p{
    margin-bottom: 18px;
    color: hsl(0, 0%, 42%);
    font-weight: 500;
   }
   p:hover{
    color: hsl(0, 0%, 7%);
   }
   #profile{
    display: flex;
    align-items: center;
   }
   #profile img{
    width: 50px;
    margin-right: 15px;
   }
   #profile h3:hover{
    color: hsl(47, 88%, 63%);
   }
   @media screen and (max-width: 360px) {
    p{
     font-size: 0.95em;
    }
   }
   @keyframes loading{
    from{
     opacity: 0;
    }
    to{
     opacity: 1;
    }
   }
  </style>
 </head>
 <body>
  <div class="container">
   <div id="card">
    <img src="./assets/images/illustration-article.svg" alt="" />
    <h6>Learning</h6>
    <h5>Published 21 Dec 2023</h5>
    <h2>HTML & CSS foundations</h2>
    <p>
     These languages are the backbone of every website, defining structure,
     content, and presentation.
    </p>
    <div id="profile">
     <img src="./assets/images/image-avatar.webp" alt="" />
     <h3>Greg Hooper</h3>
    </div>
   </div>
  </div>
 </body>
</html>
